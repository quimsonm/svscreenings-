<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .banner {
    width: 1080px;
    height: 608px;
    background: linear-gradient(135deg, #003354 0%, #004D78 40%, #005a8a 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* Subtle background accents */
  .banner::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(200, 150, 62, 0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .banner::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -50px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(200, 150, 62, 0.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Gold accent line at top */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #C8963E 0%, #d4a84e 50%, #C8963E 100%);
  }

  /* Left content */
  .content {
    position: relative;
    z-index: 2;
    flex: 1;
  }

  .brand-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: white;
    letter-spacing: 3px;
    line-height: 1.15;
  }

  .brand-sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: #C8963E;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider {
    width: 80px;
    height: 2px;
    background: #C8963E;
    margin: 28px 0;
  }

  .tagline {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
    max-width: 440px;
  }

  .details {
    display: flex;
    gap: 28px;
    margin-top: 28px;
  }

  .detail-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .detail-dot {
    width: 6px;
    height: 6px;
    background: #C8963E;
    border-radius: 50%;
  }

  /* Right side: logo area */
  .logo-area {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 260px;
    height: 260px;
  }

  /* Modern signal/radar icon */
  .logo-circle {
    width: 200px;
    height: 200px;
    border: 2px solid rgba(200, 150, 62, 0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-circle::before {
    content: '';
    position: absolute;
    width: 240px;
    height: 240px;
    border: 1px solid rgba(200, 150, 62, 0.12);
    border-radius: 50%;
  }

  .logo-circle::after {
    content: '';
    position: absolute;
    width: 160px;
    height: 160px;
    border: 1px solid rgba(200, 150, 62, 0.2);
    border-radius: 50%;
  }

  .logo-inner {
    width: 120px;
    height: 120px;
    background: rgba(200, 150, 62, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .logo-inner svg {
    width: 60px;
    height: 60px;
  }

  /* Decorative subtle grid */
  .grid-pattern {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 400px;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(255,255,255,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);
    background-size: 40px 40px;
  }
</style>
</head>
<body style="background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

<div class="banner">
  <div class="top-accent"></div>
  <div class="grid-pattern"></div>

  <div class="content">
    <div class="brand-name">SIGNAL VIEW</div>
    <div class="brand-sub">Screening Services</div>
    <div class="divider"></div>
    <div class="tagline">Premium Concierge Ultrasound Screenings in Las Vegas</div>
    <div class="details">
      <div class="detail-item">
        <div class="detail-dot"></div>
        <span>10+ Years Experience</span>
      </div>
      <div class="detail-item">
        <div class="detail-dot"></div>
        <span>Hospital-Grade Technology</span>
      </div>
      <div class="detail-item">
        <div class="detail-dot"></div>
        <span>Mobile Service Available</span>
      </div>
    </div>
  </div>

  <div class="logo-area">
    <div class="logo-circle">
      <div class="logo-inner">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 8C16 8 10 14 10 22C10 30 16 40 24 44C32 40 38 30 38 22C38 14 32 8 24 8Z" stroke="#C8963E" stroke-width="2" fill="none"/>
          <path d="M16 24C18 20 20 18 24 18" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M14 24C17 17 20 14 24 14" stroke="#C8963E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <path d="M18 24C20 22 22 21 24 21" stroke="#C8963E" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          <circle cx="24" cy="24" r="2.5" fill="#C8963E"/>
        </svg>
      </div>
    </div>
  </div>
</div>

</body>
</html>
